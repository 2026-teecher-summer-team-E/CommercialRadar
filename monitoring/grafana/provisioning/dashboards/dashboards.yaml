# Grafana 대시보드 자동 프로비저닝 — 이 폴더의 *.json 대시보드를 로드한다.
apiVersion: 1

providers:
  - name: CommercialRadar
    orgId: 1
    folder: CommercialRadar
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
