# Grafana 데이터소스 자동 프로비저닝 — Loki(로그) + Tempo·Jaeger(트레이스).
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
